name: Payments SDK

on:
  pull_request:
    paths:
      - apps/payments-service/**
      - genxapi.config.json
      - package.json
      - package-lock.json
      - .github/**
  push:
    paths:
      - apps/payments-service/**
      - genxapi.config.json
      - package.json
      - package-lock.json
      - .github/**
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the payments SDK to npm
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Generate SDK
        uses: ./.github/actions/genxapi-generate
      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: payments-sdk
          path: sdk/payments-sdk

  publish:
    runs-on: ubuntu-latest
    needs: generate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Verify npm token
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "Missing NPM_TOKEN secret. Add it to the repository secrets to publish."
            exit 1
          fi
      - name: Install dependencies
        run: npm ci
      - name: Generate SDK
        run: npm run gen:sdk:payments
      - name: Bump prerelease version
        working-directory: sdk/payments-sdk
        run: npm version prerelease --preid demo --no-git-tag-version
      - name: Publish SDK
        working-directory: sdk/payments-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
