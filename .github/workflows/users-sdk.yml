name: users-sdk

on:
  pull_request:
    paths:
      - apps/users-service/**
      - genxapi.users.config.json
      - package.json
      - package-lock.json
      - .github/**
  push:
    paths:
      - apps/users-service/**
      - genxapi.users.config.json
      - package.json
      - package-lock.json
      - .github/**
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the users SDK to npm
        required: false
        default: false
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Generate SDK
        uses: ./.github/actions/genxapi-generate
        with:
          config: genxapi.users.config.json
          preGenerate: npm run swagger:export:users
      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: users-sdk
          path: sdk/users-sdk

  publish:
    runs-on: ubuntu-latest
    needs: generate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Verify npm token
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "Missing NPM_TOKEN secret. Add it to the repository secrets to publish."
            exit 1
          fi
      - name: Generate SDK
        uses: ./.github/actions/genxapi-generate
        with:
          config: genxapi.users.config.json
          preGenerate: npm run swagger:export:users
      - name: Set demo version
        working-directory: sdk/users-sdk
        run: npm pkg set version="0.0.0-demo.${GITHUB_RUN_NUMBER}"
      - name: Publish SDK
        working-directory: sdk/users-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
