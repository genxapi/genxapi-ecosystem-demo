name: GenX API Generate
description: Generate demo SDKs from published contracts with GenX API
inputs:
  config:
    description: Path to the GenX API config file
    required: true
  contractPath:
    description: Optional pinned published contract snapshot to consume in CI
    required: false
  logLevel:
    description: GenX API log level
    required: false
    default: info
runs:
  using: composite
  steps:
    - name: Install dependencies
      run: npm ci
      shell: bash
      env:
        NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    - name: Generate SDK
      run: >-
        node tools/sdk/run-genxapi-generate.mjs
        --config ${{ inputs.config }}
        --contract ${{ inputs.contractPath }}
        --log-level ${{ inputs.logLevel }}
      shell: bash
      env:
        NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
