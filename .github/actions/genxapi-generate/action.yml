name: GenXAPI Generate
description: Generate SDKs with GenXAPI
inputs:
  config:
    description: Path to the GenXAPI config file
    required: true
  preGenerate:
    description: Command to run before SDK generation
    required: false
    default: ""
  useLocalSdk:
    description: Use local SDK packages when registry versions are not available
    required: false
    default: "false"
  logLevel:
    description: GenXAPI log level
    required: false
    default: info
runs:
  using: composite
  steps:
    - name: Prepare local SDK overrides
      if: ${{ inputs.useLocalSdk == 'true' }}
      run: node tools/ci/use-local-sdk.mjs
      shell: bash
    - name: Install dependencies (registry)
      if: ${{ inputs.useLocalSdk != 'true' }}
      run: npm ci
      shell: bash
      env:
        NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    - name: Install dependencies (local SDK)
      if: ${{ inputs.useLocalSdk == 'true' }}
      run: npm install --no-audit --no-fund --no-package-lock
      shell: bash
      env:
        NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    - name: Pre-generate step
      if: ${{ inputs.preGenerate != '' }}
      run: ${{ inputs.preGenerate }}
      shell: bash
    - name: Generate SDK
      run: npx genxapi generate --config ${{ inputs.config }} --log-level ${{ inputs.logLevel }}
      shell: bash
      env:
        NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
