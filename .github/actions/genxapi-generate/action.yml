name: GenXAPI Generate
description: Generate SDKs with GenXAPI
inputs:
  config:
    description: Path to the GenXAPI config file
    required: true
  sdkDirectory:
    description: SDK directory to normalize after generation
    required: true
  logLevel:
    description: GenXAPI log level
    required: false
    default: info
runs:
  using: composite
  steps:
    - name: Install dependencies
      run: npm ci
      shell: bash
      env:
        NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    - name: Generate SDK
      run: npx genxapi generate --config ${{ inputs.config }} --log-level ${{ inputs.logLevel }}
      shell: bash
      env:
        NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    - name: Normalize generated SDK
      run: node tools/sdk/normalize-generated-sdk.mjs ${{ inputs.sdkDirectory }}
      shell: bash
