name: GenXAPI Generate
description: Generate the payments SDK with GenXAPI
inputs:
  logLevel:
    description: GenXAPI log level
    required: false
    default: info
runs:
  using: composite
  steps:
    - name: Install dependencies
      run: npm ci
      shell: bash
    - name: Generate payments SDK
      run: npm run gen:sdk:payments
      shell: bash
